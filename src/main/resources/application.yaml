server:
  port: 8089

spring:
  application:
    name: transacao-serivce

  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/FREEPDB1
    username: guest
    password: guest
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092
          auto-create-topics: true
          configuration:
            auto.offset.reset: earliest
            replicationFactor: 3
            acks: all
            enable.idempotence: true


app:
  kafka:
    routing:
      APROVADA: "aprovadas-topic"
      REPROVADA: "reprovadas-topic"

      bindings:
        enviarTransacao-out-0:
          content-type: application/json
